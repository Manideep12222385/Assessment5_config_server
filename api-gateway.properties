spring.application.name=apigateway
server.port=8085

spring.cloud.discovery.enabled=true

eureka.client.service-url.defaultZone=http://127.0.0.1:8761/eureka/

eureka.instance.prefer-ip-address=true
eureka.instance.hostname=127.0.0.1

spring.cloud.gateway.server.webflux.routes[0].id=movie-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://MOVIE-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/movies/**

spring.cloud.gateway.server.webflux.routes[1].id=booking-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://BOOKING-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/bookings/**
