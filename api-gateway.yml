server:
  port: 8085

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: movie-service
          uri: lb://MOVIE-SERVICE
          predicates:
            - Path=/movies/**
          filters:
            - RewritePath=/movies/(?<segment>.*), /movies/${segment}

        - id: booking-service
          uri: lb://BOOKING-SERVICE
          predicates:
            - Path=/bookings/**
          filters:
            - RewritePath=/bookings/(?<segment>.*), /bookings/${segment}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
